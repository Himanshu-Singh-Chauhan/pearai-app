name: Build and Download VSCode Windows Artifact

# Trigger when changes are merged into this branch (replace with your custom branch name)
on:
  push:
    branches:
      - workflow-windows-build  # Replace with your branch name

jobs:
  windows:
    name: Build VSCode for Windows
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          
      # Step 3: Create a dummy folder and a temporary text file
      - name: Create Dummy Folder for Testing
        run: |
          $username = [Environment]::UserName  # Get the current user's name
          $dummyOutput = "C:\Users\$username\Desktop\vscode-win32-x64"
          mkdir -Force $dummyOutput
          Set-Content -Path "$dummyOutput\temp.txt" -Value "This is a temporary test file."  # Create a temp text file

      # Step 4: Compress built files into a zip archive
      - name: Compress built files
        run: |
          $username = [Environment]::UserName  # Get the current user's name
          $buildOutput = "C:\Users\$username\Desktop\vscode-win32-x64"  # Corrected path for build output
          if (Test-Path $buildOutput) {
            mkdir -Force output
            Compress-Archive -Path "$buildOutput\*" -DestinationPath output/vscode-win32-x64.zip
          } else {
            Write-Error "Build output not found at $buildOutput"
          }

      # Step 5: Upload the zip file as an artifact for download
      - name: Upload Build Artifact
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: vscode-windows-build
          path: output/vscode-win32-x64.zip
